<!DOCTYPE html>
<html>
<head>

<title>Add Expense</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Add Expense</h2>

<form method="POST">

<label>Category</label>

<select name="category" required>

<option>Food</option>
<option>Transportation</option>
<option>Shopping</option>
<option>Bills</option>
<option>Entertainment</option>
<option>Education</option>
<option>Others</option>

</select>

<label>Amount</label>

<input
type="number"
step="0.01"
name="amount"
required>

<label>Payment Method</label>

<select name="payment_method">

<option>Cash</option>
<option>GCash</option>
<option>Debit Card</option>
<option>Credit Card</option>

</select>

<label>Date</label>

<input
type="date"
name="expense_date"
value="{{ today }}">

<label>Notes</label>

<textarea
name="notes"></textarea>

<br><br>

<button>

Save Expense

</button>

</form>

<br>

<a href="/dashboard">

Back

</a>

</div>

</body>
</html>
